name: Deploy staging (dev branch)

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          DEPLOY_BASE: /kazu-friends-staging/
      - name: Push dist to the staging repo's Pages branch
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/staging_key"
          cd dist
          touch .nojekyll
          git init -b gh-pages
          git config user.name "staging-deploy"
          git config user.email "noreply@github.com"
          git add -A
          git commit -m "Staging deploy ${GITHUB_SHA::8}"
          git push -f git@github.com:kuroneko83/kazu-friends-staging.git gh-pages
